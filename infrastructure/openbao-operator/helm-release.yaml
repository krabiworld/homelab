apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao-operator
spec:
  interval: 1h
  targetNamespace: openbao
  chartRef:
    kind: OCIRepository
    name: openbao-operator
  values:
    server:
      gateway:
        httpRoute:
          enabled: true
          parentRefs:
            - name: default
              namespace: default
              sectionName: https
          hosts:
            - openbao.home.arpa
        tlsPolicy:
          enabled: true
    ui:
      enabled: true
