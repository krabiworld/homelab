apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  releaseName: flux-operator
  chartRef:
    kind: OCIRepository
    name: flux-operator
  values:
    reporting:
      interval: 1m
    web:
      config:
        authentication:
          type: Anonymous
          anonymous:
            username: flux
            groups:
              - flux-admin
      httpRoute:
        enabled: true
        parentRefs:
          - name: default
            namespace: default
            sectionName: https
        hostnames:
          - flux.home.arpa
